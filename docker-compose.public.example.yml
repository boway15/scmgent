# 公网专用机 override 示例（Win11 + Cloudflare Tunnel）
#
# 用法：
#   copy docker-compose.public.example.yml docker-compose.public.yml
#   编辑 docker-compose.public.yml（域名、密钥、飞书）
#   docker compose -f docker-compose.yml -f docker-compose.public.yml up -d --build
#
# docker-compose.public.yml 已加入 .gitignore，避免密钥进仓库。

services:
  web:
    environment:
      # 与 Cloudflare Tunnel 子域名一致，无末尾斜杠
      APP_BASE_URL: https://scm.al6s.cn

      # 登录策略：必须登录；邮箱 + 飞书（需配置 FEISHU_*）
      AUTH_REQUIRE_LOGIN: "true"
      EMAIL_AUTH_ENABLED: "true"
      FEISHU_AUTH_ENABLED: "true"

      # 生产必改（示例占位，请换成随机串）
      JWT_SECRET: change-me-to-random-32-chars-minimum
      CRON_SECRET: change-me-cron-secret-production

      # 首次部署设置超管密码（seed 后 admin@scm.local 可用此密码登录）
      BOOTSTRAP_ADMIN_PASSWORD: change-me-strong-password

      # 飞书 OAuth（与飞书开放平台重定向 URL 完全一致）
      FEISHU_APP_ID: cli_xxxxxxxx
      FEISHU_APP_SECRET: xxxxxxxx
      FEISHU_OAUTH_REDIRECT_URI: https://scm.al6s.cn/api/auth/feishu/callback
