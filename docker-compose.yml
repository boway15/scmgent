services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scm_dev
      POSTGRES_USER: scm
      POSTGRES_PASSWORD: scm_dev_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scm -d scm_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: scm-agent-web:latest
    ports:
      - "8081:8080"
    environment:
      DATABASE_URL: postgresql://scm:scm_dev_pass@postgres:5432/scm_dev
      DB_HOST: postgres
      DB_USER: scm
      DB_NAME: scm_dev
      PORT: 8080
      APP_BASE_URL: http://localhost:8081
      NODE_ENV: production
      SERVE_STATIC: "true"
      JWT_SECRET: local-docker-jwt-secret-scm-agent-dev
      # 登录策略：开发环境仅邮箱登录，不启用飞书
      AUTH_REQUIRE_LOGIN: "true"
      EMAIL_AUTH_ENABLED: "true"
      FEISHU_AUTH_ENABLED: "false"
      BOOTSTRAP_ADMIN_PASSWORD: "admin123456"
      BOOTSTRAP_ADMIN_PASSWORD_FORCE: "true"
      ENFORCE_RBAC: "true"
      CRON_SECRET: "dev-cron-secret-local"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
