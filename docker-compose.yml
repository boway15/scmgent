services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scm_dev
      POSTGRES_USER: scm
      POSTGRES_PASSWORD: scm_dev_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scm -d scm_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: scm-agent-web:latest
    ports:
      - "8081:8080"
    environment:
      DATABASE_URL: postgresql://scm:scm_dev_pass@postgres:5432/scm_dev
      DB_HOST: postgres
      DB_USER: scm
      DB_NAME: scm_dev
      PORT: 8080
      APP_BASE_URL: http://localhost:8081
      NODE_ENV: production
      SERVE_STATIC: "true"
      # 本地 Docker 开发免登录：自动以 admin@scm.local（超级管理员）访问
      AUTH_DEV_MODE: "true"
      ENFORCE_RBAC: "true"
      CRON_SECRET: "dev-cron-secret-local"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
