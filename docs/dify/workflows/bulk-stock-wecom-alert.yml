    - data:
        code: "from datetime import datetime, timedelta, time\nfrom zoneinfo import ZoneInfo\n\nTZ = ZoneInfo(\"Asia/Shanghai\")\n\n\ndef main(days_threshold: str = \"2\") -> dict:\n    \"\"\"日历超期：不计今天，超过 N 天。\n\n    例：今天 7/17、N=2 → 7/16、7/15 不算超期；统计 7/14 及之前。\n    cutoff_ms = 上海「今天 − N 天」00:00:00（不含），推送时间 < cutoff 即命中。\n    \"\"\"\n    try:\n        days = int(float((days_threshold or \"2\").strip()))\n    except Exception:\n        days = 2\n    if days < 0:\n        days = 2\n    now = datetime.now(TZ)\n    today = now.date()\n    cutoff_date = today - timedelta(days=days)  # 7/17, N=2 → 7/15\n    cutoff = datetime.combine(cutoff_date, time.min, tzinfo=TZ)\n    latest_overdue = cutoff_date - timedelta(days=1)  # 7/14\n    return {\n        \"days_threshold\": days,\n        \"cutoff_ms\": int(cutoff.timestamp() * 1000),\n        \"cutoff_date_text\": latest_overdue.isoformat(),\n        \"now_text\": now.strftime(\"%Y-%m-%d %H:%M:%S\"),\n    }\n"
        code_language: python3
        desc: 日历超期：不计今天，超过 N 天；cutoff=今天−N 日 00:00（不含）
        outputs:
          cutoff_date_text:
            children: null
            type: string
          cutoff_ms:
            children: null
            type: number
          days_threshold:
            children: null
            type: number
          now_text:
            children: null
            type: string
        selected: false
        title: 解析超时阈值
        type: code
        variables:
        - value_selector:
          - env
          - DAYS_THRESHOLD
          variable: days_threshold
      height: 112
      id: parse_threshold
      position:
        x: 342
        y: 67
      positionAbsolute:
        x: 342
        y: 67
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "import json\nimport ssl\nimport urllib.error\nimport urllib.request\n\
          \nSSL_CONTEXT = ssl.create_default_context()\nSSL_CONTEXT.check_hostname\
          \ = False\nSSL_CONTEXT.verify_mode = ssl.CERT_NONE\n\ndef main(feishu_app_id:\
          \ str = \"\", feishu_app_secret: str = \"\") -> dict:\n    app_id = (feishu_app_id\
          \ or \"\").strip()\n    app_secret = (feishu_app_secret or \"\").strip()\n\
          \    if not app_id:\n        raise Exception(\n            \"FEISHU_APP_ID\
          \ 未配置或为空。请在 Dify 工作流「环境变量」填写飞书 App ID（cli_ 开头），保存并重新发布。\"\n\
          \        )\n    if not app_secret:\n        raise Exception(\n         \
          \   \"FEISHU_APP_SECRET 未配置或为空。请在 Dify 工作流「环境变量」填写飞书 App Secret，保存并重新发布。\"\
          \n        )\n    payload = json.dumps({\"app_id\": app_id, \"app_secret\"\
          : app_secret}).encode(\"utf-8\")\n    req = urllib.request.Request(\n  \
          \      \"https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal\"\
          ,\n        data=payload,\n        headers={\"Content-Type\": \"application/json\"\
          },\n        method=\"POST\",\n    )\n    try:\n        with urllib.request.urlopen(req,\
          \ timeout=30, context=SSL_CONTEXT) as resp:\n            raw = resp.read().decode(\"\
          utf-8\")\n    except urllib.error.HTTPError as e:\n        raw = e.read().decode(\"\
          utf-8\")\n        raise Exception(f\"飞书鉴权 HTTP {e.code}: {raw}\")\n   \
          \ data = json.loads(raw or \"{}\")\n    token = data.get(\"tenant_access_token\"\
          , \"\")\n    if not token:\n        code = data.get(\"code\")\n        msg\
          \ = data.get(\"msg\", \"\")\n        if code == 10003:\n            raise\
          \ Exception(\n                \"飞书返回 invalid param(10003)：App ID / App Secret\
          \ 为空或格式错误。\"\n                f\"请检查环境变量 FEISHU_APP_ID、FEISHU_APP_SECRET（当前\
          \ app_id 长度={len(app_id)}）。\"\n            )\n        if code == 10014:\n\
          \            raise Exception(\n                \"飞书返回 app secret invalid(10014)：App\
          \ Secret 不正确，请到飞书开放平台重新复制最新 Secret。\"\n            )\n        raise Exception(f\"\
          飞书鉴权失败: code={code}, msg={msg}\")\n    return {\"tenant_access_token\":\
          \ token}\n"
        code_language: python3
        desc: Code 节点从环境变量读取凭证并请求 Token（避免 HTTP 节点 env 变量未注入导致 10003）
        outputs:
          tenant_access_token:
            children: null
            type: string
        selected: false
        title: 获取飞书 Token
        type: code
        variables:
        - value_selector:
          - env
          - FEISHU_APP_ID
          variable: feishu_app_id
        - value_selector:
          - env
          - FEISHU_APP_SECRET
          variable: feishu_app_secret
      height: 112
      id: fetch_feishu_token
      position:
        x: 684
        y: 67
      positionAbsolute:
        x: 684
        y: 67
