    - data:
        code: "import json\nimport ssl\nimport urllib.error\nimport urllib.request\n\nDEFAULT_HOOK_KEY = \"1bd8d81d-148f-409f-bf7e-b4511be3471f\"\nWECOM_MAX_CHARS = 1300\nSSL_CONTEXT = ssl.create_default_context()\nSSL_CONTEXT.check_hostname = False\nSSL_CONTEXT.verify_mode = ssl.CERT_NONE\n\n\ndef char_len(text):\n    return len(text or \"\")\n\n\ndef split_for_wecom(text: str, max_chars: int = WECOM_MAX_CHARS):\n    text = (text or \"\").strip()\n    if not text:\n        return []\n    if char_len(text) <= max_chars:\n        return [text]\n    parts = []\n    start = 0\n    while start < len(text):\n        end = min(start + max_chars, len(text))\n        parts.append(text[start:end])\n        start = end\n    return [p for p in parts if p.strip()]\n\n\ndef send_markdown(webhook_url: str, content: str) -> dict:\n    if char_len(content) > WECOM_MAX_CHARS:\n        raise Exception(\n            f\"单条消息 {char_len(content)} 字，超过企业微信 {WECOM_MAX_CHARS} 字上限\"\n        )\n    payload = json.dumps(\n        {\n            \"msgtype\": \"markdown\",\n            \"markdown\": {\"content\": content},\n        },\n        ensure_ascii=False,\n    ).encode(\"utf-8\")\n    req = urllib.request.Request(\n        webhook_url,\n        data=payload,\n        headers={\"Content-Type\": \"application/json; charset=utf-8\"},\n        method=\"POST\",\n    )\n    try:\n        with urllib.request.urlopen(req, timeout=30, context=SSL_CONTEXT) as resp:\n            raw = resp.read().decode(\"utf-8\")\n    except urllib.error.HTTPError as e:\n        raw = e.read().decode(\"utf-8\")\n        raise Exception(f\"HTTP {e.code}: {raw}\")\n    data = json.loads(raw or \"{}\")\n    if data.get(\"errcode\") != 0:\n        raise Exception(\n            f\"企业微信 errcode={data.get('errcode')} errmsg={data.get('errmsg')}\"\n        )\n    return data\n\n\ndef main(push_messages_json: str, hook_key: str = \"\") -> dict:\n    key = (hook_key or \"\").strip() or DEFAULT_HOOK_KEY\n    webhook_url = f\"https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key={key}\"\n    try:\n        messages = json.loads(push_messages_json or \"[]\")\n    except Exception as e:\n        raise Exception(f\"push_messages_json 解析失败: {e}\")\n    if not messages:\n        raise Exception(\"push_messages_json 为空，请检查「按供应商生成推送内容」\")\n\n    results = []\n    send_index = 0\n    for msg in messages:\n        text = (msg or \"\").strip()\n        if not text:\n            continue\n        for part in split_for_wecom(text):\n            send_index += 1\n            response = send_markdown(webhook_url, part)\n            results.append(\n                {\n                    \"index\": send_index,\n                    \"length\": char_len(part),\n                    \"errcode\": response.get(\"errcode\"),\n                    \"errmsg\": response.get(\"errmsg\", \"ok\"),\n                }\n            )\n\n    return {\n        \"push_count\": len(results),\n        \"push_results\": json.dumps(results, ensure_ascii=False),\n    }\n"
        code_language: python3
        desc: 逐条推送企业微信 markdown 消息（单条≤1300字）
        outputs:
          push_count:
            children: null
            type: number
          push_results:
            children: null
            type: string
