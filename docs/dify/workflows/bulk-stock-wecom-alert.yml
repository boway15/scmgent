    - data:
        code: "import json\n\ndef main(cutoff_ms: float) -> dict:\n    # 推送时间是文本列(fieldType=1)，飞书不支持 isLess；仅筛状态，按推送时间升序，本地按日历超期比较\n    # 例：今天 7/17、N=2 → cutoff=7/15 00:00，下游取推送时间早于 cutoff（即 7/14 及之前）\n    cutoff = int(cutoff_ms or 0)\n    body = {\n        \"filter\": {\n            \"conjunction\": \"and\",\n            \"conditions\": [{\n                \"field_name\": \"订单确认状态\",\n                \"operator\": \"is\",\n                \"value\": [\"待供应商确认\"],\n            }],\n        },\n        \"sort\": [{\"field_name\": \"推送时间\", \"desc\": False}],\n        \"field_names\": [\"订单确认状态\", \"推送时间\", \"供应商简称\", \"SKU\", \"需求单号\"],\n        \"page_size\": 500,\n        \"automatic_fields\": False,\n    }\n    return {\n        \"search_body\": json.dumps(body, ensure_ascii=False),\n        \"cutoff_ms\": cutoff,\n    }"
        code_language: python3
        desc: 仅筛待供应商确认（推送时间为文本列不可 isLess）；升序后下游本地按日历超期筛选
        outputs:
          cutoff_ms:
            children: null
            type: number
          search_body:
            children: null
            type: string
        selected: false
        title: 构建查表条件
        type: code
        variables:
        - value_selector:
          - parse_threshold
          - cutoff_ms
          variable: cutoff_ms
      height: 96
      id: build_search_body
      position:
