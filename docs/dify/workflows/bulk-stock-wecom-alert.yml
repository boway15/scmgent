    - data:
        authorization:
          type: no-auth
        body:
          data: '{{#build_search_body.search_body#}}'
          type: raw-text
        desc: HTTP search 单页最多 500 条；超时 60s，避开 Code 沙箱 15s 限制。推送时间升序保证超期旧单优先
        headers: 'Content-Type: application/json

          Authorization: Bearer {{#fetch_feishu_token.tenant_access_token#}}

          '
        method: post
        params: ''
        retry_config:
          max_retries: 2
          retry_enabled: true
          retry_interval: 1000
        selected: false
        ssl_verify: true
        timeout:
          max_connect_timeout: 10
          max_read_timeout: 60
          max_write_timeout: 30
        title: 查询飞书多维表格
        type: http-request
        url: https://open.feishu.cn/open-apis/bitable/v1/apps/HPJzbHdPea7elSs92T8c31BTnxe/tables/tbl7H8F6rc2xeFGf/records/search
        variables: []
      height: 246
      id: feishu_list_records
      position:
        x: 1710
        y: 0
      positionAbsolute:
        x: 1710
        y: 0
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "import json\nimport re\nfrom datetime import datetime\nfrom zoneinfo import ZoneInfo\n\nSTATUS_PENDING = \"待供应商确认\"\nFIELD_PUSH_TIME = \"推送时间\"\nFIELD_STATUS = \"订单确认状态\"\nFIELD_SUPPLIER = \"供应商简称\"\nFIELD_SKU = \"SKU\"\nTZ = ZoneInfo(\"Asia/Shanghai\")\n\n\ndef text_value(value):\n    if value is None:\n        return \"\"\n    if isinstance(value, str):\n        return value.strip()\n    if isinstance(value, bool):\n        return \"true\" if value else \"false\"\n    if isinstance(value, (int, float)):\n        if value > 100000000000:\n            return datetime.fromtimestamp(value / 1000, TZ).strftime(\"%Y-%m-%d %H:%M:%S\")\n        return str(value).strip()\n    if isinstance(value, list):\n        parts = []\n        for item in value:\n            if isinstance(item, dict):\n                parts.append(str(item.get(\"text\") or item.get(\"name\") or item.get(\"value\") or \"\").strip())\n            else:\n                parts.append(str(item).strip())\n        return \"\".join([p for p in parts if p])\n    if isinstance(value, dict):\n        for key in (\"text\", \"name\", \"value\"):\n            if key in value and value.get(key) is not None:\n                nested = text_value(value.get(key))\n                if nested:\n                    return nested\n        return \"\"\n    return str(value).strip()\n\n\ndef parse_push_time_ms(value):\n    if value is None:\n        return None\n    if isinstance(value, (int, float)):\n        n = int(value)\n        if n > 100000000000:\n            return n\n        if n > 1000000000:\n            return n * 1000\n        return None\n    if isinstance(value, str):\n        text = value.strip()\n        if not text:\n            return None\n        if re.fullmatch(r\"\\d{13}\", text):\n            return int(text)\n        if re.fullmatch(r\"\\d{10}\", text):\n            return int(text) * 1000\n        for fmt in (\n            \"%Y-%m-%d %H:%M:%S\", \"%Y/%m/%d %H:%M:%S\",\n            \"%Y-%m-%d %H:%M\", \"%Y/%m/%d %H:%M\",\n            \"%Y-%m-%d\", \"%Y/%m/%d\", \"%Y.%m.%d\",\n        ):\n            try:\n                sample = text[:19] if \":\" in fmt else text[:10]\n                dt = datetime.strptime(sample, fmt).replace(tzinfo=TZ)\n                return int(dt.timestamp() * 1000)\n            except Exception:\n                pass\n        m = re.match(r\"(\\d{4})[-/.](\\d{1,2})[-/.](\\d{1,2})\", text)\n        if m:\n            try:\n                dt = datetime(int(m.group(1)), int(m.group(2)), int(m.group(3)), tzinfo=TZ)\n                return int(dt.timestamp() * 1000)\n            except Exception:\n                pass\n        return None\n    if isinstance(value, list):\n        for item in value:\n            ms = parse_push_time_ms(item)\n            if ms is not None:\n                return ms\n        return None\n    if isinstance(value, dict):\n        for key in (\"value\", \"text\", \"name\", \"date\"):\n            if key in value:\n                ms = parse_push_time_ms(value.get(key))\n                if ms is not None:\n                    return ms\n        return None\n    return None\n\n\ndef main(records_body, cutoff_ms: float, days_threshold: float, now_text: str = \"\") -> dict:\n    if isinstance(records_body, dict):\n        payload = records_body\n    elif isinstance(records_body, str) and records_body.strip():\n        payload = json.loads(records_body)\n    else:\n        payload = {}\n    if payload.get(\"code\") not in (0, None):\n        raise Exception(f\"查询飞书表格失败: {payload}\")\n    records = payload.get(\"data\", {}).get(\"items\", []) or []\n    has_more = bool(payload.get(\"data\", {}).get(\"has_more\"))\n    cutoff_ms = int(cutoff_ms or 0)\n    cutoff_dt = datetime.fromtimestamp(cutoff_ms / 1000, TZ)\n    matched = []\n    skipped = {\"status\": 0, \"time_parse_fail\": 0, \"time_too_recent\": 0, \"sku\": 0}\n    debug_samples = []\n\n    for record in records:\n        fields = record.get(\"fields\", {})\n        status = text_value(fields.get(FIELD_STATUS))\n        if status != STATUS_PENDING:\n            skipped[\"status\"] += 1\n            continue\n        push_field = fields.get(FIELD_PUSH_TIME)\n        push_ms = parse_push_time_ms(push_field)\n        push_raw = text_value(push_field)\n        if len(debug_samples) < 3:\n            debug_samples.append({\n                \"push_raw\": push_raw,\n                \"push_ms\": push_ms,\n                \"field_type\": type(push_field).__name__,\n            })\n        if push_ms is None:\n            skipped[\"time_parse_fail\"] += 1\n            continue\n        # cutoff = 今天−N 日 00:00（不含）；推送时间 >= cutoff 视为未超期\n        if push_ms >= cutoff_ms:\n            skipped[\"time_too_recent\"] += 1\n            continue\n        sku = text_value(fields.get(FIELD_SKU))\n        if not sku:\n            skipped[\"sku\"] += 1\n            continue\n        matched.append({\n            \"供应商简称\": text_value(fields.get(FIELD_SUPPLIER)) or \"未知供应商\",\n            \"SKU\": sku,\n            \"推送时间\": push_raw,\n            \"需求单号\": text_value(fields.get(\"需求单号\")),\n        })\n\n    matched.sort(key=lambda x: (x.get(\"供应商简称\", \"\"), x.get(\"SKU\", \"\")))\n\n    return {\n        \"has_rows\": len(matched) > 0,\n        \"matched_count\": len(matched),\n        \"rows_json\": json.dumps(matched, ensure_ascii=False),\n        \"days_threshold\": int(days_threshold or 2),\n        \"cutoff_text\": cutoff_dt.strftime(\"%Y-%m-%d %H:%M:%S\"),\n        \"now_text\": now_text or \"\",\n        \"scanned_count\": len(records),\n        \"total_fetched\": len(records),\n        \"has_more\": has_more,\n        \"skipped_json\": json.dumps(skipped, ensure_ascii=False),\n        \"debug_sample\": json.dumps(debug_samples, ensure_ascii=False),\n    }"
        code_language: python3
        desc: 解析 HTTP search；按日历 cutoff（今天−N 日 00:00 不含）筛选超期
